<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Working Pro UI</title>

<script src="https://cdn.tailwindcss.com"></script>

<!-- GSAP -->
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>

<!-- HLS -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<!-- Lenis -->
<script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis"></script>

<style>
body { background:#010101; color:white; font-family:system-ui; }

/* gradient */
.gradient-text {
  background: linear-gradient(135deg,#fff,#FA93FA,#983AD6);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* glass */
.glass {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
}

/* section */
.section { padding:100px 20px; }

/* slider */
.slider { display:flex; gap:60px; width:max-content; }

/* mesh */
.mesh {
  position:absolute;
  inset:0;
  background: radial-gradient(circle at 30% 30%, #C967E8, transparent 40%),
              radial-gradient(circle at 70% 70%, #983AD6, transparent 40%);
  filter: blur(120px);
}

/* cards */
.card {
  padding:30px;
  background:rgba(255,255,255,0.05);
  border-radius:12px;
}

/* video */
video { opacity:0.6; width:100%; }
</style>
</head>

<body>

<!-- HERO -->
<section class="relative text-center pt-32 px-6">

<div class="mesh -z-10"></div>

<h1 class="hero-title text-5xl md:text-7xl gradient-text">
<span>Your</span> <span>Vision</span><br>
<span>Our</span> <span>Reality</span>
</h1>

<p class="hero-sub mt-6 text-white/70">
Modern UI that actually works.
</p>

<button class="hero-btn mt-6 bg-white text-black px-6 py-3 rounded-full">
Start
</button>

<!-- VIDEO -->
<div class="mt-10">
<video id="heroVideo" autoplay muted loop playsinline></video>
</div>

</section>

<!-- LOGOS -->
<section class="section glass">
<div class="overflow-hidden">
<div id="logoSlider" class="slider">
<img src="https://html.tailus.io/blocks/customers/openai.svg" class="h-6 invert"/>
<img src="https://html.tailus.io/blocks/customers/nvidia.svg" class="h-6 invert"/>
<img src="https://html.tailus.io/blocks/customers/github.svg" class="h-6 invert"/>

<img src="https://html.tailus.io/blocks/customers/openai.svg" class="h-6 invert"/>
<img src="https://html.tailus.io/blocks/customers/nvidia.svg" class="h-6 invert"/>
<img src="https://html.tailus.io/blocks/customers/github.svg" class="h-6 invert"/>
</div>
</div>
</section>

<!-- SERVICES -->
<section class="section text-center">
<h2 class="gradient-text text-4xl">Services</h2>

<div class="grid md:grid-cols-3 gap-6 mt-10">
<div class="card">UI/UX</div>
<div class="card">Dev</div>
<div class="card">Branding</div>
</div>
</section>

<script>
document.addEventListener("DOMContentLoaded", () => {

  // ✅ GSAP WORKING
  gsap.registerPlugin(ScrollTrigger);

  gsap.from(".hero-title span", {
    y:100,
    opacity:0,
    stagger:0.1,
    duration:1
  });

  gsap.from(".hero-sub", {
    opacity:0,
    y:30,
    delay:0.3
  });

  // ✅ LOGO SCROLL
  gsap.to("#logoSlider", {
    xPercent:-50,
    repeat:-1,
    duration:15,
    ease:"linear"
  });

  // ✅ LENIS (smooth scroll)
  const lenis = new Lenis();
  function raf(time){
    lenis.raf(time);
    requestAnimationFrame(raf);
  }
  requestAnimationFrame(raf);

  // ✅ VIDEO FIX (important)
  const video = document.getElementById("heroVideo");

  if (video) {
    const src = "https://www.w3schools.com/html/mov_bbb.mp4"; // guaranteed working

    video.src = src;
    video.play().catch(() => {});
  }

});
</script>

</body>
</html>
